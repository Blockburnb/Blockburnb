name: Update GitHub Stats

on:
  schedule:
    - cron: '0 6 * * *'  # Tous les jours à 6h UTC
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Check APIs and update stats section
        run: |
          python3 << 'EOF'
          import urllib.request
          import re

          USERNAME = "Blockburnb"
          THEME = "radical"

          STATS = [
              (
                  "Streak Stats",
                  f"https://streak-stats.demolab.com/?user={USERNAME}&theme={THEME}"
              ),
              (
                  "Stats",
                  f"https://github-readme-stats.vercel.app/api?username={USERNAME}&show_icons=true&theme={THEME}"
              ),
              (
                  "Top Langages",
                  f"https://github-readme-stats.vercel.app/api/top-langs/?username={USERNAME}&layout=compact&theme={THEME}"
              ),
          ]

          MARKER_START = "<!--START_SECTION:github-stats-->"
          MARKER_END = "<!--END_SECTION:github-stats-->"

          ERROR_PATTERNS = [
              "Error Fetching Resource",
              "An error occurred",
              "Couldn't resolve host",
              "Something went wrong",
              "This service is temporarily unavailable",
              "Rate limit exceeded",
              "Not Found",
              "Bad Gateway",
              "Forbidden",
          ]

          def check_url(url):
              try:
                  request = urllib.request.Request(
                      url,
                      headers={"User-Agent": "github-actions-stats-checker/1.0"},
                  )
                  with urllib.request.urlopen(request, timeout=10) as resp:
                      if resp.getcode() != 200:
                          return False
                      content = resp.read().decode("utf-8", errors="replace")
                      normalized = content.lower()

                      # Les cartes valides renvoient du SVG ; tout autre format est traité comme une erreur.
                      if "<svg" not in normalized or "</svg>" not in normalized:
                          return False

                      return not any(
                          pattern.lower() in normalized
                          for pattern in ERROR_PATTERNS
                      )
              except Exception:
                  return False

          SNAKE_BLOCK = """<picture>
  <source media="(prefers-color-scheme: dark)" srcset="output/github-contribution-grid-snake-dark.svg" />
  <source media="(prefers-color-scheme: light)" srcset="output/github-contribution-grid-snake.svg" />
  <img alt="Contribution grid snake animation" src="output/github-contribution-grid-snake.svg" />
</picture>"""

          lines = []
          for label, url in STATS:
              if check_url(url):
                  lines.append(f"![{label}]({url})")

          content = "\n\n".join(lines + [SNAKE_BLOCK])

          with open("README.md", "r", encoding="utf-8") as f:
              readme = f.read()

          if MARKER_START not in readme or MARKER_END not in readme:
              print("Markers not found in README.md — skipping update.")
              exit(0)

          new_readme = re.sub(
              r"<!--START_SECTION:github-stats-->.*?<!--END_SECTION:github-stats-->",
              f"{MARKER_START}\n{content}\n{MARKER_END}",
              readme,
              flags=re.DOTALL,
          )

          with open("README.md", "w", encoding="utf-8") as f:
              f.write(new_readme)

          print(f"Stats section updated with {len(lines)} badge(s) + snake animation.")
          EOF

      - name: Commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: update GitHub stats section" || exit 0
          git push
