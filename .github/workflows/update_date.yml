name: Update README Date

on:
  push:
    branches:
      - main
  workflow_dispatch: # Permet de le lancer manuellement

jobs:
  update-date:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Get current date
        id: date
        run: echo "DATE=$(date +'%d %B %Y')" >> $GITHUB_ENV

      - name: Update README
        run: |
          # Remplace le texte entre les balises par la date actuelle
          sed -i "s/.*/${{ env.DATE }} /g" README.md

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "Update last updated date" || exit 0
          git push
