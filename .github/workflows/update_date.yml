name: Update README Date

on:
  push:
    branches:
      - main
  workflow_dispatch: # Permet de le lancer manuellement

permissions:
  contents: write

jobs:
  update-date:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Update README date
        run: |
          # Remplace uniquement la ligne de date de mise à jour
          sed -i "s/Dernière mise à jour : .*/Dernière mise à jour : ${{ env.DATE }} */g" README.md

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          if ! git diff --staged --quiet; then
            git commit -m "chore: mise à jour automatique de la date du README [skip ci]"
            git push
          else
            echo "Rien à committer"
          fi
