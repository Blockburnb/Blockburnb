name: Update README Date

on:
  push:
    branches:
      - main
  workflow_dispatch: # Permet de le lancer manuellement

permissions:
  contents: write

jobs:
  update-date:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Update README date
        run: |
          python3 << 'EOF'
          import datetime
          import re

          months = [
            "Janvier",
            "Février",
            "Mars",
            "Avril",
            "Mai",
            "Juin",
            "Juillet",
            "Août",
            "Septembre",
            "Octobre",
            "Novembre",
            "Décembre",
          ]

          now = datetime.datetime.now(datetime.UTC)
          formatted = f"{now.day} {months[now.month - 1]} {now.year}"
          new_line = f"Dernière mise à jour : {formatted}"

          with open("README.md", "r", encoding="utf-8") as f:
            content = f.read()

          if re.search(r"^Dernière mise à jour\s*:\s*.*$", content, flags=re.MULTILINE):
            content = re.sub(
              r"^Dernière mise à jour\s*:\s*.*$",
              new_line,
              content,
              flags=re.MULTILINE,
            )
          else:
            if not content.endswith("\n"):
              content += "\n"
            content += f"{new_line}\n"

          with open("README.md", "w", encoding="utf-8") as f:
            f.write(content)

          print(new_line)
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          if ! git diff --staged --quiet; then
            git commit -m "chore: mise à jour automatique de la date du README [skip ci]"
            git push
          else
            echo "Rien à committer"
          fi
